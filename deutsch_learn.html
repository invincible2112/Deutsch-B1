<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Deutsch Lernen — Lý thuyết A1–C2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0a0a0f;--bg-1:#111118;--bg-2:#16161f;--bg-3:#1c1c28;--bg-4:#252535;
  --border-0:rgba(255,255,255,.06);--border-1:rgba(255,255,255,.1);--border-2:rgba(255,255,255,.18);
  --text-0:#ffffff;--text-1:rgba(255,255,255,.85);--text-2:rgba(255,255,255,.52);--text-3:rgba(255,255,255,.28);
  --accent:#4F8EF7;--accent-dim:rgba(79,142,247,.12);--accent-glow:rgba(79,142,247,.28);
  --green:#3ECF8E;--green-dim:rgba(62,207,142,.1);
  --red:#F87171;--red-dim:rgba(248,113,113,.1);
  --amber:#FBBF24;--amber-dim:rgba(251,191,36,.1);
  --purple:#A78BFA;--purple-dim:rgba(167,139,250,.1);
  --font-sans:'Geist',system-ui,sans-serif;--font-mono:'Geist Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font-sans);background:var(--bg-0);color:var(--text-1);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:260px;flex-shrink:0;background:var(--bg-1);border-right:1px solid var(--border-0);
  display:flex;flex-direction:column;overflow:hidden;transition:width .25s cubic-bezier(.4,0,.2,1);
}
.sidebar.collapsed{width:52px;}
.sb-top{padding:.85rem .9rem .6rem;border-bottom:1px solid var(--border-0);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sb-logo{font-weight:700;font-size:13.5px;color:var(--text-0);white-space:nowrap;overflow:hidden;flex:1;letter-spacing:-.3px;}
.sb-logo span{color:var(--accent);}
.sb-collapse{background:none;border:1px solid var(--border-1);border-radius:6px;padding:4px 6px;cursor:pointer;color:var(--text-2);font-size:13px;flex-shrink:0;}
.sb-collapse:hover{background:var(--bg-3);color:var(--text-0);}
.sidebar.collapsed .sb-logo,.sidebar.collapsed .sb-search{display:none;}
.sb-search-wrap{padding:.6rem .9rem;border-bottom:1px solid var(--border-0);flex-shrink:0;}
.sb-search{width:100%;padding:6px 10px 6px 30px;border-radius:8px;border:1px solid var(--border-1);background:var(--bg-2);color:var(--text-0);font-size:12.5px;font-family:var(--font-sans);outline:none;transition:border-color .15s;position:relative;}
.sb-search:focus{border-color:var(--accent);}
.sb-search-icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;color:var(--text-3);}
.sb-scroll{flex:1;overflow-y:auto;padding:.5rem 0 1rem;}
.sb-scroll::-webkit-scrollbar{width:3px;}
.sb-scroll::-webkit-scrollbar-track{background:transparent;}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border-1);border-radius:2px;}

/* sidebar level group */
.sb-group{margin-bottom:.35rem;}
.sb-group-hd{
  display:flex;align-items:center;gap:6px;padding:.45rem .9rem;cursor:pointer;
  font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;
  user-select:none;transition:color .15s;font-family:var(--font-mono);
}
.sb-group-hd:hover{color:var(--text-1);}
.sb-group-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-group-arrow{font-size:10px;margin-left:auto;transition:transform .2s;}
.sb-group.open .sb-group-arrow{transform:rotate(90deg);}
.sb-group-items{display:none;}
.sb-group.open .sb-group-items{display:block;}
.sb-item{
  display:flex;align-items:center;gap:8px;padding:.38rem .9rem .38rem 1.6rem;cursor:pointer;
  font-size:12.5px;color:var(--text-2);border-radius:0;transition:all .12s;
  position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sb-item:hover{color:var(--text-1);background:var(--bg-2);}
.sb-item.active{color:var(--accent);background:var(--accent-dim);}
.sb-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--accent);border-radius:0 2px 2px 0;}
.sb-item.read{color:var(--text-2);}
.sb-item.read .sb-check{opacity:1;}
.sb-check{font-size:10px;color:var(--green);margin-left:auto;opacity:0;flex-shrink:0;}
.sidebar.collapsed .sb-group-hd span,.sidebar.collapsed .sb-group-items{display:none;}
.sidebar.collapsed .sb-group-dot{margin:0 auto;}
.sidebar.collapsed .sb-group-hd{padding:.6rem;justify-content:center;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:.6rem 1.2rem;border-bottom:1px solid var(--border-0);background:var(--bg-1);flex-shrink:0;}
.tb-title{font-size:14px;font-weight:600;color:var(--text-0);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-btns{display:flex;gap:6px;flex-shrink:0;}
.tb-btn{background:var(--bg-2);border:1px solid var(--border-1);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text-2);font-family:var(--font-sans);transition:all .15s;white-space:nowrap;}
.tb-btn:hover{background:var(--bg-3);color:var(--text-1);border-color:var(--border-2);}
.tb-btn.primary{background:var(--accent);color:#fff;border-color:transparent;}
.tb-btn.primary:hover{opacity:.88;}
.tb-progress{flex-shrink:0;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-3);font-family:var(--font-mono);}
.tb-pbar{width:80px;height:4px;background:var(--bg-4);border-radius:2px;overflow:hidden;}
.tb-pfill{height:4px;background:linear-gradient(90deg,var(--accent),#818CF8);border-radius:2px;transition:width .5s;}

/* content */
.content{flex:1;overflow-y:auto;padding:1.5rem 1.4rem 3rem;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border-1);border-radius:2px;}

/* ── WELCOME SCREEN ── */
.welcome{max-width:520px;margin:0 auto;padding-top:2rem;}
.welcome-hero{text-align:center;margin-bottom:2rem;}
.welcome-title{font-size:30px;font-weight:700;color:var(--text-0);letter-spacing:-1px;line-height:1.2;margin-bottom:.5rem;}
.welcome-title span{color:var(--accent);}
.welcome-sub{font-size:14px;color:var(--text-2);line-height:1.7;}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
.lv-card{background:var(--bg-1);border:1px solid var(--border-0);border-radius:12px;padding:.85rem .75rem;cursor:pointer;transition:all .2s;text-align:center;}
.lv-card:hover{border-color:var(--border-2);background:var(--bg-2);transform:translateY(-1px);}
.lv-card-badge{font-size:12px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:.4rem;font-family:var(--font-mono);}
.lv-card-name{font-size:12px;color:var(--text-2);line-height:1.4;}
.lv-card-count{font-size:11px;color:var(--text-3);margin-top:2px;font-family:var(--font-mono);}
.lv-card-prog{height:3px;background:var(--bg-4);border-radius:2px;margin-top:.5rem;overflow:hidden;}
.lv-card-prog-fill{height:3px;border-radius:2px;transition:width .5s;}

/* ── LESSON CONTENT ── */
.lesson{max-width:640px;margin:0 auto;}
.lesson-header{margin-bottom:1.5rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border-0);}
.lesson-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:.5rem;font-family:var(--font-mono);}
.lesson-title{font-size:26px;font-weight:700;color:var(--text-0);letter-spacing:-.6px;line-height:1.2;margin-bottom:.4rem;}
.lesson-subtitle{font-size:14px;color:var(--text-2);}
.lesson-meta{display:flex;gap:12px;margin-top:.75rem;font-size:11px;color:var(--text-3);font-family:var(--font-mono);}
.lesson-meta span{display:flex;align-items:center;gap:4px;}

/* section headings */
.sec{margin-bottom:1.4rem;}
.sec-title{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem;font-family:var(--font-mono);display:flex;align-items:center;gap:6px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border-0);}
.body-text{font-size:14px;color:var(--text-2);line-height:1.85;}

/* formula */
.formula-box{
  background:var(--bg-0);border:1px solid var(--border-1);border-radius:10px;
  padding:.85rem 1.1rem;font-family:var(--font-mono);font-size:13px;color:var(--accent);
  margin:.5rem 0 .9rem;line-height:1.9;letter-spacing:.01em;
}
.f-row{display:flex;align-items:baseline;gap:.5rem;flex-wrap:wrap;}
.f-key{color:var(--accent);font-weight:600;}
.f-sep{color:var(--text-3);}
.f-val{color:var(--text-1);}
.f-note{font-size:11px;color:var(--text-3);display:block;margin-top:.2rem;font-family:var(--font-sans);}

/* examples */
.ex-grid{display:flex;flex-direction:column;gap:8px;margin:.4rem 0 .9rem;}
.ex-item{background:var(--bg-2);border:1px solid var(--border-0);border-radius:10px;padding:.7rem .95rem;border-left:3px solid var(--border-2);}
.ex-item.good{border-left-color:var(--green);}
.ex-item.bad{border-left-color:var(--red);}
.ex-item.accent{border-left-color:var(--accent);}
.ex-de{font-size:14px;font-style:italic;color:var(--text-0);line-height:1.6;}
.ex-de .hl{background:var(--accent-dim);color:var(--accent);border-radius:4px;padding:0 3px;font-style:normal;font-weight:600;font-size:13px;}
.ex-de .hl-red{background:var(--red-dim);color:var(--red);border-radius:4px;padding:0 3px;font-style:normal;font-weight:600;font-size:13px;}
.ex-vi{font-size:12px;color:var(--text-3);margin-top:4px;}
.ex-note{font-size:11px;color:var(--text-2);margin-top:5px;padding-top:5px;border-top:1px solid var(--border-0);font-family:var(--font-mono);}
.spk-mini{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:11px;padding:2px 5px;border-radius:4px;margin-top:4px;font-family:var(--font-sans);transition:color .15s;display:inline-flex;align-items:center;gap:3px;}
.spk-mini svg{width:10px;height:10px;fill:currentColor;}
.spk-mini:hover{color:var(--accent);}
.spk-mini.go{color:var(--accent);animation:pulse .7s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* tip / danger / good boxes */
.tip-box,.danger-box,.good-box{border-radius:9px;padding:.6rem .9rem;font-size:13px;margin:.4rem 0 .7rem;line-height:1.65;}
.tip-box{background:var(--amber-dim);border:1px solid rgba(251,191,36,.2);color:var(--amber);}
.danger-box{background:var(--red-dim);border:1px solid rgba(248,113,113,.2);color:var(--red);}
.good-box{background:var(--green-dim);border:1px solid rgba(62,207,142,.2);color:var(--green);}
.tip-box strong,.danger-box strong,.good-box strong{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.25rem;font-family:var(--font-mono);}

/* compare table */
.compare-table{width:100%;border-collapse:collapse;margin:.4rem 0 .9rem;font-size:13px;}
.compare-table th{background:var(--bg-2);padding:6px 10px;text-align:left;font-size:10.5px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border-1);font-family:var(--font-mono);}
.compare-table td{padding:8px 10px;border-bottom:1px solid var(--border-0);vertical-align:top;line-height:1.5;}
.compare-table tr:last-child td{border-bottom:none;}
.compare-table .c-a{color:var(--accent);font-family:var(--font-mono);font-weight:600;}
.compare-table .c-b{color:var(--purple);font-family:var(--font-mono);font-weight:600;}

/* badge levels */
.b-A1{color:#4ADE80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);}
.b-A2{color:#34D399;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);}
.b-B1{color:#FBBF24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);}
.b-B2{color:#F97316;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);}
.b-C1{color:#A78BFA;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);}
.b-C2{color:#F472B6;background:rgba(244,114,182,.1);border:1px solid rgba(244,114,182,.2);}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;font-family:var(--font-mono);}

/* mini quiz */
.quiz-wrap{background:var(--bg-1);border:1px solid var(--border-1);border-radius:12px;overflow:hidden;margin-top:1.5rem;}
.quiz-hd{padding:.75rem 1rem;background:var(--accent-dim);border-bottom:1px solid var(--accent-glow);display:flex;align-items:center;gap:8px;}
.quiz-hd-title{font-size:13px;font-weight:600;color:var(--accent);}
.quiz-hd-sub{font-size:11px;color:var(--text-3);margin-left:auto;font-family:var(--font-mono);}
.quiz-body{padding:.9rem 1rem;}
.quiz-q{font-size:14px;font-weight:500;color:var(--text-0);margin-bottom:.7rem;line-height:1.5;}
.quiz-opts{display:flex;flex-direction:column;gap:7px;}
.quiz-opt{padding:9px 13px;border-radius:8px;border:1px solid var(--border-1);background:var(--bg-2);font-size:13.5px;cursor:pointer;text-align:left;font-family:var(--font-sans);color:var(--text-1);transition:all .15s;}
.quiz-opt:hover{border-color:var(--border-2);background:var(--bg-3);}
.quiz-opt.ok{background:var(--green-dim);border-color:rgba(62,207,142,.3);color:var(--green);pointer-events:none;}
.quiz-opt.no{background:var(--red-dim);border-color:rgba(248,113,113,.3);color:var(--red);pointer-events:none;}
.quiz-opt.show{background:var(--green-dim);border-color:rgba(62,207,142,.3);color:var(--green);pointer-events:none;}
.quiz-explain{font-size:12px;color:var(--text-2);margin-top:.5rem;padding:.5rem .7rem;background:var(--bg-2);border-radius:7px;border-left:2px solid var(--accent);display:none;line-height:1.6;}
.quiz-explain.show{display:block;}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;border-top:1px solid var(--border-0);}
.quiz-ctr{font-size:11px;color:var(--text-3);font-family:var(--font-mono);}
.quiz-next{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:var(--font-sans);font-weight:500;}
.quiz-next:hover{opacity:.88;}
.quiz-result{text-align:center;padding:1.2rem;}
.qr-score{font-size:36px;font-weight:700;font-family:var(--font-mono);letter-spacing:-1px;}
.qr-sub{font-size:12px;color:var(--text-3);margin-top:3px;font-family:var(--font-mono);}

/* lesson nav */
.lesson-nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.2rem;border-top:1px solid var(--border-0);}
.ln-btn{background:var(--bg-2);border:1px solid var(--border-1);border-radius:9px;padding:.6rem 1rem;font-size:13px;cursor:pointer;color:var(--text-2);font-family:var(--font-sans);transition:all .15s;display:flex;align-items:center;gap:6px;max-width:45%;}
.ln-btn:hover{border-color:var(--border-2);color:var(--text-1);}
.ln-btn.primary{background:var(--accent);color:#fff;border-color:transparent;}
.ln-btn.primary:hover{opacity:.88;}
.ln-btn-label{font-size:10px;color:var(--text-3);display:block;margin-bottom:1px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.07em;}
.ln-btn .primary .ln-btn-label{color:rgba(255,255,255,.6);}
.ln-btn-title{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mark-done-wrap{text-align:center;}
.mark-done{background:var(--green-dim);border:1px solid rgba(62,207,142,.25);border-radius:9px;padding:.55rem 1.2rem;font-size:12.5px;color:var(--green);cursor:pointer;font-family:var(--font-sans);font-weight:500;transition:all .15s;}
.mark-done:hover{background:rgba(62,207,142,.2);}
.mark-done.done{background:var(--green);color:#000;border-color:var(--green);}

/* mobile sidebar overlay */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}
.sb-hamburger{display:none;background:none;border:1px solid var(--border-1);border-radius:7px;padding:5px 8px;cursor:pointer;color:var(--text-2);font-size:14px;}
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
  .sidebar.mobile-open{transform:translateX(0);}
  .sb-overlay.show{display:block;}
  .sb-hamburger{display:block;}
  .tb-progress{display:none;}
}

/* floating toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg-3);border:1px solid var(--border-2);border-radius:10px;padding:.55rem 1.1rem;font-size:13px;font-weight:500;color:var(--text-0);opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* scrollbar for content */
.content::-webkit-scrollbar{width:5px;}
</style>
</head>

    </div>

        <span class="sb-search-icon">🔍</span>

      </div>

      <button class="sb-hamburger" onclick="toggleMobile()">☰</button>

      <div class="tb-progress">
        <div class="tb-pbar"><div class="tb-pfill" id="tbPfill" style="width:0%"></div></div>
        <span id="tbPct">0%</span>
      </div>
      <div class="tb-btns">
        <button class="tb-btn" onclick="window.location.href='index.html'" title="App học bài">📱 App</button>
        <button class="tb-btn" onclick="window.location.href='reference.html'" title="Sổ tay">📖 Ref</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<script src="grammar_data.js"></script>
<script>
// ═══════════════════════════════════════════════════
// BRIDGE: Convert GRAMMAR_DATA → CURRICULUM format
// grammar_data.js must be loaded first via <script src>
// ═══════════════════════════════════════════════════

function buildCurriculum() {
  if(typeof GRAMMAR_DATA === 'undefined') {
    console.error('grammar_data.js not loaded!');
    return [];
  }
  const levels = ['A1','A2','B1','B2','C1','C2'];
  const result = [];
  levels.forEach(lv => {
    const topics = GRAMMAR_DATA[lv] || [];
    topics.forEach(t => {
      result.push({
        id: t.id,
        lv: t.lv,
        title: t.title,
        subtitle: t.titleVi || t.sub || '',
        mins: t.mins || 10,
        intro: t.theory ? t.theory.intro : '',
        formula: t.theory ? t.theory.formula : '',
        formulaRaw: t.theory ? t.theory.formulaRaw : null,
        examples: t.theory ? (t.theory.examples || []) : [],
        tips: t.theory ? (t.theory.tips || []) : [],
        dangers: t.theory ? (t.theory.dangers || []) : [],
        compare: t.theory ? (t.theory.compare || []) : [],
        fill: t.fill || null,
        quiz: t.quiz || []
      });
    });
  });
  return result;
}

const CURRICULUM = buildCurriculum();

// ════════════════ APP STATE ════════════════
const gg=(k,d=null)=>{try{return JSON.parse(localStorage.getItem(k)||'null')??d;}catch{return d;}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
let readTopics=gg('learnRead',{});
let currentId=null;
let quizState={idx:0,correct:0,answered:false};
const LCOLORS={A1:'#4ADE80',A2:'#34D399',B1:'#FBBF24',B2:'#F97316',C1:'#A78BFA',C2:'#F472B6'};

// ════════════════ SPEAK ════════════════
function speak(txt,btn=null){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  if(btn&&btn.classList.contains('go')){btn.classList.remove('go');return;}
  document.querySelectorAll('.spk-mini').forEach(b=>b.classList.remove('go'));
  const u=new SpeechSynthesisUtterance(txt);u.lang='de-DE';u.rate=0.87;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('de'));if(v)u.voice=v;
  if(btn){btn.classList.add('go');u.onend=u.onerror=()=>btn.classList.remove('go');}
  speechSynthesis.speak(u);
}

// ════════════════ TOAST ════════════════
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}

// ════════════════ SIDEBAR ════════════════
function buildSidebar(filter=''){
  const scroll=document.getElementById('sbScroll');
  const levels=['A1','A2','B1','B2','C1','C2'];
  const lvNames={A1:'Cơ bản sơ cấp',A2:'Cơ bản',B1:'Trung cấp thấp',B2:'Trung cấp',C1:'Cao cấp',C2:'Thành thạo'};
  let html='';
  levels.forEach(lv=>{
    const items=CURRICULUM.filter(c=>c.lv===lv&&(!filter||c.title.toLowerCase().includes(filter.toLowerCase())||c.subtitle.toLowerCase().includes(filter.toLowerCase())));
    if(!items.length)return;
    const doneCount=items.filter(c=>readTopics[c.id]).length;
    const isOpen=filter||items.some(c=>c.id===currentId)?'open':'';
    html+=`<div class="sb-group ${isOpen}" id="sbg_${lv}">
      <div class="sb-group-hd" onclick="toggleGroup('${lv}')">
        <div class="sb-group-dot" style="background:${LCOLORS[lv]}"></div>
        <span>${lv} — ${lvNames[lv]}</span>
        <span style="font-size:10px;color:var(--text-3);margin-left:4px;font-family:var(--font-mono)">${doneCount}/${items.length}</span>
        <span class="sb-group-arrow">›</span>
      </div>
      <div class="sb-group-items">
        ${items.map(c=>`<div class="sb-item${c.id===currentId?' active':''}${readTopics[c.id]?' read':''}" onclick="loadLesson('${c.id}')" id="sbi_${c.id}">
          ${c.title}
          <span class="sb-check">✓</span>
        </div>`).join('')}
      </div>
    </div>`;
  });
  scroll.innerHTML=html;
}

function toggleGroup(lv){
  const g=document.getElementById('sbg_'+lv);if(g)g.classList.toggle('open');
}
function filterSidebar(q){buildSidebar(q);}
function toggleSidebar(){
  const sb=document.getElementById('sidebar');sb.classList.toggle('collapsed');
}
function toggleMobile(){
  const sb=document.getElementById('sidebar');const ov=document.getElementById('sbOverlay');
  sb.classList.toggle('mobile-open');ov.classList.toggle('show');
}

// ════════════════ PROGRESS ════════════════
function updateProgress(){
  const total=CURRICULUM.length;
  const done=CURRICULUM.filter(c=>readTopics[c.id]).length;
  const pct=Math.round(done/total*100);
  document.getElementById('tbPfill').style.width=pct+'%';
  document.getElementById('tbPct').textContent=pct+'%';
}

// ════════════════ WELCOME SCREEN ════════════════
function renderWelcome(){
  document.getElementById('tbTitle').textContent='Deutsch Lernen A1–C2';
  const levels=['A1','A2','B1','B2','C1','C2'];
  const lvDescs={A1:'Căn bản: sein, haben, Artikel, Kasus',A2:'Perfekt, Modalverben, Präpositionen',B1:'Nebensätze, Passiv, Konjunktiv II',B2:'Relativsatz, Konzessiv, Stilistik',C1:'Partizip, Nominalisierung, Komplex',C2:'Modalpartikeln, Wissenschaftssprache'};
  const totalLv=(l)=>CURRICULUM.filter(c=>c.lv===l).length;
  const doneLv=(l)=>CURRICULUM.filter(c=>c.lv===l&&readTopics[c.id]).length;
  const total=CURRICULUM.length,done=CURRICULUM.filter(c=>readTopics[c.id]).length;
  document.getElementById('content').innerHTML=`<div class="welcome">
    <div class="welcome-hero">
      <div class="welcome-title">Giáo trình<br><span>Deutsch A1–C2</span></div>
      <div class="welcome-sub">${CURRICULUM.length} chủ đề ngữ pháp chi tiết · Lý thuyết + Ví dụ + Quiz · Từ A1 đến C2</div>
      <div style="margin-top:1rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <div style="background:var(--bg-2);border:1px solid var(--border-0);border-radius:8px;padding:.5rem 1rem;text-align:center">
          <div style="font-size:20px;font-weight:700;color:var(--text-0);font-family:var(--font-mono)">${done}/${total}</div>
          <div style="font-size:11px;color:var(--text-3)">Đã học</div>
        </div>
        <div style="background:var(--bg-2);border:1px solid var(--border-0);border-radius:8px;padding:.5rem 1rem;text-align:center">
          <div style="font-size:20px;font-weight:700;color:var(--accent);font-family:var(--font-mono)">${Math.round(done/total*100)}%</div>
          <div style="font-size:11px;color:var(--text-3)">Hoàn thành</div>
        </div>
      </div>
    </div>
    <div class="level-grid">
      ${levels.map(l=>{
        const d=doneLv(l),t=totalLv(l),pct=t?Math.round(d/t*100):0;
        return`<div class="lv-card" onclick="loadLesson(CURRICULUM.find(c=>c.lv==='${l}').id)">
          <div class="lv-card-badge badge b-${l}">${l}</div>
          <div class="lv-card-name">${lvDescs[l]}</div>
          <div class="lv-card-count">${d}/${t} chủ đề</div>
          <div class="lv-card-prog"><div class="lv-card-prog-fill" style="width:${pct}%;background:${LCOLORS[l]}"></div></div>
        </div>`;
      }).join('')}
    </div>
    ${done===0?`<div style="background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:12px;padding:1rem;text-align:center">
      <div style="font-size:14px;font-weight:600;color:var(--accent);margin-bottom:.3rem">Bắt đầu từ đâu?</div>
      <div style="font-size:13px;color:var(--text-2)">Chọn một cấp độ bên trên hoặc nhấn vào chủ đề trong sidebar bên trái</div>
    </div>`:''}
  </div>`;
}

// ════════════════ LESSON LOADER ════════════════
function loadLesson(id){
  const lesson=CURRICULUM.find(c=>c.id===id);
  if(!lesson){console.error('Lesson not found:',id);return;}
  currentId=id;
  quizState={idx:0,correct:0,answered:false};
  // Update sidebar
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const sbi=document.getElementById('sbi_'+id);if(sbi)sbi.classList.add('active');
  // Open parent group
  document.querySelectorAll('.sb-group').forEach(g=>{
    const items=g.querySelectorAll('.sb-item');
    if(Array.from(items).some(i=>i.id==='sbi_'+id))g.classList.add('open');
  });
  document.getElementById('tbTitle').textContent=lesson.title;
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sbOverlay').classList.remove('show');
  // Render
  try{
    renderLesson(lesson);
  }catch(e){
    console.error('renderLesson error:',e);
    document.getElementById('content').innerHTML=`<div style="padding:1rem;color:var(--red)">Lỗi hiển thị bài: ${e.message}<br><small>${e.stack||''}</small></div>`;
  }
  document.getElementById('content').scrollTop=0;
}

function renderLesson(lesson){
  const idx=CURRICULUM.findIndex(c=>c.id===lesson.id);
  const prev=CURRICULUM[idx-1];const next=CURRICULUM[idx+1];
  const isDone=readTopics[lesson.id];
  const SPK_ICO=`<svg viewBox="0 0 24 24" style="width:11px;height:11px;fill:currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`;

  // ─── Helper: render examples ───
  function renderExamples(examples){
    if(!examples||!examples.length) return '';
    return `<div class="sec">
      <div class="sec-title">📝 Ví dụ chi tiết — phân tích từng câu</div>
      <div class="ex-grid">
        ${examples.map((e,i)=>{
          const de=(e.de||'').replace(/<hl>(.*?)<\/hl>/g,'<span class="hl">$1</span>').replace(/<hl-red>(.*?)<\/hl-red>/g,'<span class="hl-red">$1</span>');
          const plain=(e.de||'').replace(/<[^>]+>/g,'');
          const border=e.good===false?'var(--red)':'var(--green)';
          const icon=e.good===false?'❌':'✅';
          return `<div class="ex-item" style="border-left-color:${border}">
            <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:4px">
              <span style="font-size:14px;flex-shrink:0">${icon}</span>
              <div style="flex:1">
                <div class="ex-de">${de}</div>
                <div class="ex-vi" style="margin-top:3px">${e.vi||''}</div>
              </div>
              <button class="spk-mini" onclick="speak('${plain.replace(/'/g,"\\'")}',this)">${SPK_ICO}</button>
            </div>
            ${e.note?`<div class="ex-note" style="margin-left:22px">↳ ${e.note}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ─── Helper: render tips + dangers ───
  function renderTips(tips, dangers){
    let h='';
    if(tips&&tips.length){
      h+=`<div class="sec"><div class="sec-title">💡 Mẹo & Tricks</div>`;
      tips.forEach(t=>{
        if(typeof t==='string') h+=`<div class="tip-box">💡 ${t.replace(/\n/g,'<br>')}</div>`;
        else h+=`<div class="${t.type==='danger'?'danger-box':'tip-box'}"><strong>${t.type==='danger'?'⚠️':'💡'} ${t.title||''}</strong><br>${(t.text||'').replace(/\n/g,'<br>')}</div>`;
      });
      h+=`</div>`;
    }
    if(dangers&&dangers.length){
      h+=`<div class="sec"><div class="sec-title">⚠️ Lỗi hay gặp — tránh ngay từ đầu</div>`;
      dangers.forEach(d=>{
        if(typeof d==='string') h+=`<div class="danger-box">⚠️ ${d.replace(/\n/g,'<br>')}</div>`;
        else h+=`<div class="danger-box"><strong>⚠️ ${d.title||''}</strong><br>${(d.text||'').replace(/\n/g,'<br>')}</div>`;
      });
      h+=`</div>`;
    }
    return h;
  }

  // ─── Helper: render compare ───
  function renderCompare(compare){
    if(!compare||!compare.length) return '';
    return `<div class="sec">
      <div class="sec-title">⚖️ So sánh dễ nhầm</div>
      ${compare.map(cp=>`
        <div style="background:var(--bg-2);border:1px solid var(--border-0);border-radius:10px;padding:.7rem .9rem;margin-bottom:.5rem">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:.35rem">
            <span style="background:var(--accent-dim);color:var(--accent);border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700;font-family:var(--font-mono)">${cp.a}</span>
            <span style="color:var(--text-3);font-size:12px">vs</span>
            <span style="background:var(--purple-dim);color:var(--purple);border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700;font-family:var(--font-mono)">${cp.b}</span>
          </div>
          <div style="font-size:12.5px;color:var(--text-2);line-height:1.65">${cp.c}</div>
        </div>`).join('')}
    </div>`;
  }

  let html=`<div class="lesson">
    <div class="lesson-header">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:.5rem">
        <div class="lesson-badge badge b-${lesson.lv}">${lesson.lv}</div>
        <div style="font-size:11px;color:var(--text-3);font-family:var(--font-mono)">${lesson.subtitle||''}</div>
      </div>
      <div class="lesson-title">${lesson.title}</div>
      <div class="lesson-meta" style="margin-top:.5rem">
        <span>📖 ~${lesson.mins||10} phút</span>
        <span>❓ ${(lesson.quiz||[]).length} câu quiz</span>
        ${isDone?'<span style="color:var(--green)">✓ Đã học</span>':''}
      </div>
    </div>`;

  // ─── 1. INTRO ───
  if(lesson.intro){
    html+=`<div class="sec">
      <div class="sec-title">📖 Tổng quan — Đây là gì?</div>
      <div class="body-text">${lesson.intro}</div>
    </div>`;
  }

  // ─── 2. FORMULA ───
  if(lesson.formula&&lesson.formula!==''){
    let fmtHtml='';
    if(Array.isArray(lesson.formula)){
      fmtHtml=`<table style="width:100%;border-collapse:collapse;font-size:13px">
        ${lesson.formula.map(([p,f])=>`<tr>
          <td style="color:var(--text-3);padding:3px 18px 3px 0;font-family:var(--font-mono);white-space:nowrap">${p}</td>
          <td style="color:var(--accent);font-weight:700;font-family:var(--font-mono)">${f}</td>
        </tr>`).join('')}
      </table>`;
    } else {
      fmtHtml=`<pre style="white-space:pre-wrap;font-family:var(--font-mono);font-size:12.5px;color:var(--accent);line-height:2;margin:0">${lesson.formula}</pre>`;
    }
    html+=`<div class="sec">
      <div class="sec-title">📐 Công thức & Cấu trúc</div>
      <div class="formula-box">${fmtHtml}</div>
    </div>`;
  }
  if(lesson.formulaRaw){
    html+=`<div class="sec"><div class="sec-title">📐 Công thức</div>${lesson.formulaRaw}</div>`;
  }

  // ─── 3. EXAMPLES ───
  html+=renderExamples(lesson.examples);

  // ─── 4. TIPS + DANGERS ───
  html+=renderTips(lesson.tips, lesson.dangers);

  // ─── 5. COMPARE ───
  html+=renderCompare(lesson.compare);

  // ─── 6. QUIZ ───
  if(lesson.quiz&&lesson.quiz.length){
    html+=`<div class="quiz-wrap" id="quizWrap">
      <div class="quiz-hd">
        <span style="font-size:16px">❓</span>
        <span class="quiz-hd-title">Kiểm tra nhanh — ${lesson.quiz.length} câu</span>
        <span class="quiz-hd-sub" id="quizCtr">Câu 1/${lesson.quiz.length}</span>
      </div>
      <div id="quizBody"></div>
      <div class="quiz-nav">
        <span></span>
        <button class="quiz-next" id="quizNext" style="display:none" onclick="nextQuiz()">Tiếp →</button>
      </div>
    </div>`;
  }

  // ─── 7. NAVIGATION ───
  html+=`<div class="lesson-nav">
    ${prev?`<button class="ln-btn" onclick="loadLesson('${prev.id}')">
      <span>←</span>
      <div><span class="ln-btn-label">Trước</span><span class="ln-btn-title">${prev.title}</span></div>
    </button>`:'<div></div>'}
    <div class="mark-done-wrap">
      <button class="mark-done${isDone?' done':''}" id="markDoneBtn" onclick="markDone('${lesson.id}')">
        ${isDone?'✓ Đã học':'Đánh dấu đã học ✓'}
      </button>
    </div>
    ${next?`<button class="ln-btn" style="text-align:right;justify-content:flex-end" onclick="loadLesson('${next.id}')">
      <div><span class="ln-btn-label">Tiếp theo</span><span class="ln-btn-title">${next.title}</span></div>
      <span>→</span>
    </button>`:'<div></div>'}
  </div>
  </div>`;

  document.getElementById('content').innerHTML=html;
  // Init quiz after render
  if(lesson.quiz&&lesson.quiz.length) renderQuiz(lesson);
}

function renderQuiz(lesson){
  const q=lesson.quiz[quizState.idx];
  if(!q)return;
  quizState.answered=false;
  document.getElementById('quizCtr').textContent=`Câu ${quizState.idx+1}/${lesson.quiz.length}`;
  document.getElementById('quizNext').style.display='none';
  document.getElementById('quizBody').innerHTML=`<div class="quiz-body">
    <div class="quiz-q">${quizState.idx+1}. ${q.q}</div>
    <div class="quiz-opts">
      ${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQuiz(${i},${q.c},'${q.ex.replace(/'/g,"\\'")}','${lesson.id}')">${o}</button>`).join('')}
    </div>
    <div class="quiz-explain" id="qExp"></div>
  </div>`;
}
function answerQuiz(chosen,correct,explain,lessonId){
  if(quizState.answered)return;quizState.answered=true;
  const opts=document.querySelectorAll('.quiz-opt');
  opts[chosen].classList.add(chosen===correct?'ok':'no');
  if(chosen!==correct)opts[correct].classList.add('show');
  const exp=document.getElementById('qExp');exp.classList.add('show');exp.innerHTML='💡 '+explain;
  if(chosen===correct)quizState.correct++;
  document.getElementById('quizNext').style.display='block';
  document.getElementById('quizNext').onclick=()=>nextQuiz(lessonId);
}
function nextQuiz(lessonId){
  const lesson=CURRICULUM.find(c=>c.id===lessonId)||CURRICULUM.find(c=>c.id===currentId);
  if(!lesson)return;
  quizState.idx++;
  if(quizState.idx>=lesson.quiz.length){
    // Show result
    const pct=Math.round(quizState.correct/lesson.quiz.length*100);
    const col=pct>=80?'var(--green)':pct>=50?'var(--accent)':'var(--amber)';
    document.getElementById('quizBody').innerHTML=`<div class="quiz-result">
      <div class="qr-score" style="color:${col}">${quizState.correct}/${lesson.quiz.length}</div>
      <div class="qr-sub">${pct}% · ${pct>=80?'Xuất sắc! Tiếp tục →':pct>=50?'Khá ổn! Ôn lại nhé':'Ôn thêm lý thuyết!'}</div>
      ${pct>=80?`<button class="quiz-next" style="margin-top:.75rem;width:100%;padding:9px" onclick="markDone('${lesson.id}');const n=CURRICULUM[CURRICULUM.findIndex(c=>c.id==='${lesson.id}')+1];if(n)loadLesson(n.id)">✓ Đã hiểu · Bài tiếp →</button>`:`<button class="quiz-next" style="margin-top:.75rem;background:var(--amber);width:100%;padding:9px" onclick="quizState={idx:0,correct:0,answered:false};renderQuiz(CURRICULUM.find(c=>c.id==='${lesson.id}'))">↻ Làm lại quiz</button>`}
    </div>`;
    document.getElementById('quizCtr').textContent='Hoàn thành!';
    document.getElementById('quizNext').style.display='none';
    if(pct>=80)markDone(lesson.id,true);
  } else {
    renderQuiz(lesson);
  }
}
function markDone(id,silent=false){
  readTopics[id]=true;ss('learnRead',readTopics);
  const btn=document.getElementById('markDoneBtn');
  if(btn){btn.textContent='✓ Đã học';btn.classList.add('done');}
  const sbi=document.getElementById('sbi_'+id);
  if(sbi){sbi.classList.add('read');const chk=sbi.querySelector('.sb-check');if(chk)chk.style.opacity='1';}
  updateProgress();buildSidebar(document.getElementById('sbSearch').value);
  if(!silent)toast('✓ Đánh dấu đã học!');
}

// ════════════════ INIT ════════════════
speechSynthesis&&speechSynthesis.getVoices();
buildSidebar();
updateProgress();
renderWelcome();


</script>

</body></html>
